name: GitHub Release

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release-please:
    name: Prepare or create release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      sha: ${{ steps.release.outputs.sha }}

    steps:
      - name: Update release pull request or create draft release
        id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-and-publish:
    name: Build, sign, and publish Android release
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40

    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    env:
      RELEASE_TAG: ${{ needs.release-please.outputs.tag_name }}
      RELEASE_VERSION: ${{ needs.release-please.outputs.version }}
      ANDROID_SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
      ORG_GRADLE_PROJECT_DIARIUM_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ORG_GRADLE_PROJECT_DIARIUM_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ORG_GRADLE_PROJECT_DIARIUM_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

    steps:
      - name: Checkout released commit
        uses: actions/checkout@v7
        with:
          ref: ${{ needs.release-please.outputs.sha }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          token: ${{ secrets.GITHUB_TOKEN }}
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Validate release metadata and signing secrets
        shell: bash
        run: |
          repository_version="$(tr -d '\r\n' < version.txt)"
          if [ "$repository_version" != "$RELEASE_VERSION" ]; then
            echo "Release version $RELEASE_VERSION does not match version.txt ($repository_version)."
            exit 1
          fi

          required_values=(
            "$ANDROID_SIGNING_KEY_BASE64"
            "$ORG_GRADLE_PROJECT_DIARIUM_RELEASE_STORE_PASSWORD"
            "$ORG_GRADLE_PROJECT_DIARIUM_RELEASE_KEY_ALIAS"
            "$ORG_GRADLE_PROJECT_DIARIUM_RELEASE_KEY_PASSWORD"
          )
          for value in "${required_values[@]}"; do
            if [ -z "$value" ]; then
              echo "Android release signing secrets are incomplete."
              exit 1
            fi
          done

      - name: Restore Android release keystore
        shell: bash
        run: |
          keystore_path="$RUNNER_TEMP/diarium-release.jks"
          printf '%s' "$ANDROID_SIGNING_KEY_BASE64" \
            | base64 --decode \
            > "$keystore_path"
          echo "ORG_GRADLE_PROJECT_DIARIUM_RELEASE_STORE_FILE=$keystore_path" \
            >> "$GITHUB_ENV"

      - name: Verify and build released commit
        run: >-
          ./gradlew
          detekt
          :core:jvmTest
          :app:sharedLogic:allTests
          :app:sharedUI:allTests
          :app:androidApp:lintRelease
          :app:androidApp:assembleRelease
          --stacktrace
          --no-daemon

      - name: Verify APK signature
        shell: bash
        run: |
          apk_path="app/androidApp/build/outputs/apk/release/androidApp-release.apk"
          apksigner_path="$(
            find "$ANDROID_HOME/build-tools" -type f -name apksigner \
              | sort -V \
              | tail -n 1
          )"
          if [ -z "$apksigner_path" ]; then
            echo "apksigner was not found in the Android SDK."
            exit 1
          fi
          "$apksigner_path" verify --verbose --print-certs "$apk_path"

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          asset_name="Diarium-${RELEASE_TAG}.apk"
          cp \
            app/androidApp/build/outputs/apk/release/androidApp-release.apk \
            "release-assets/$asset_name"
          pushd release-assets
          sha256sum "$asset_name" > "$asset_name.sha256"
          popd

      - name: Attest public release artifact
        if: github.event.repository.visibility == 'public'
        uses: actions/attest@v4
        with:
          subject-path: release-assets/*.apk

      - name: Attach assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "$RELEASE_TAG" release-assets/* --clobber

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "$RELEASE_TAG" --draft=false --latest

      - name: Remove restored keystore
        if: always()
        shell: bash
        run: |
          if [ -n "${ORG_GRADLE_PROJECT_DIARIUM_RELEASE_STORE_FILE:-}" ]; then
            rm -f "$ORG_GRADLE_PROJECT_DIARIUM_RELEASE_STORE_FILE"
          fi
