name: Diarium CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-and-build:
    name: Static analysis, tests, and Android build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Run static analysis and JVM/KMP tests
        run: >-
          ./gradlew
          detekt
          :core:jvmTest
          :app:sharedLogic:allTests
          :app:sharedUI:allTests
          --stacktrace
          --no-daemon

      - name: Build and lint Android debug app
        run: >-
          ./gradlew
          :app:androidApp:assembleDebug
          :app:androidApp:assembleDebugAndroidTest
          :app:androidApp:lintDebug
          --stacktrace
          --no-daemon

      - name: Upload test and lint reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: JVM-KMP-and-lint-reports
          path: |
            **/build/reports/tests/**
            **/build/reports/detekt/**
            app/androidApp/build/reports/lint-results-debug.*
          if-no-files-found: warn

      - name: Upload debug APKs
        uses: actions/upload-artifact@v6
        with:
          name: Android-debug-builds
          path: |
            app/androidApp/build/outputs/apk/debug/*.apk
            app/androidApp/build/outputs/apk/androidTest/debug/*.apk
          if-no-files-found: error

  android-instrumentation:
    name: Room and launch tests on Android emulator
    needs: quality-and-build
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Enable KVM for the Android emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android instrumentation tests
        uses: ReactiveCircus/android-emulator-runner@v2.37.0
        with:
          api-level: 35
          arch: x86_64
          profile: pixel_6
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: ./gradlew :app:androidApp:connectedDebugAndroidTest --stacktrace --no-daemon

      - name: Upload instrumentation reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: Android-instrumentation-reports
          path: |
            app/androidApp/build/reports/androidTests/**
            app/androidApp/build/outputs/androidTest-results/**
          if-no-files-found: warn

  ios-build:
    name: Build iOS simulator app
    runs-on: macos-latest
    timeout-minutes: 35

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'jetbrains'
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build iOS app and embedded KMP framework
        run: >-
          xcodebuild
          -project app/iosApp/iosApp.xcodeproj
          -scheme iosApp
          -sdk iphonesimulator
          -configuration Debug
          -derivedDataPath build/ios-derived-data
          CODE_SIGNING_ALLOWED=NO
          build
